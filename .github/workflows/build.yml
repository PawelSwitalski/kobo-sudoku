name: Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  host-tests:
    name: Host unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (host, tests on)
        run: cmake -B build/host -DSUDOKU_BACKEND=none -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build/host --config Release

      - name: Run tests
        run: ctest --test-dir build/host --output-on-failure

  kobo-cross-build:
    name: Kobo device build (armhf)
    runs-on: ubuntu-latest
    needs: host-tests
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest koxtoolchain release tag
        id: koxtc
        run: |
          tag=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/koreader/koxtoolchain/releases/latest | jq -r .tag_name)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # koxtoolchain publishes a prebuilt cross-compiler for Kobo (arm-kobo-linux-gnueabihf)
      # as a release asset, so CI can skip the ~30 min crosstool-ng build (gen-tc.sh) entirely.
      # https://github.com/koreader/koxtoolchain/releases
      - name: Cache koxtoolchain (kobo)
        id: cache-koxtc
        uses: actions/cache@v4
        with:
          path: ~/x-tools/arm-kobo-linux-gnueabihf
          key: koxtoolchain-kobo-${{ steps.koxtc.outputs.tag }}

      - name: Download & unpack koxtoolchain (kobo)
        if: steps.cache-koxtc.outputs.cache-hit != 'true'
        run: |
          curl -L -o kobo.tar.gz \
            "https://github.com/koreader/koxtoolchain/releases/download/${{ steps.koxtc.outputs.tag }}/kobo.tar.gz"
          mkdir -p "$HOME/x-tools"
          tar -xzf kobo.tar.gz -C "$HOME/x-tools"

      - name: Build FBInk (static, cross)
        run: tools/build-fbink.sh

      - name: Configure (device, fbink backend)
        run: cmake -B build/kobo -DCMAKE_TOOLCHAIN_FILE=cmake/kobo-toolchain.cmake -DSUDOKU_BACKEND=fbink

      - name: Build device binary
        run: cmake --build build/kobo

      - name: Ensure zip is available
        run: command -v zip >/dev/null || (sudo apt-get update && sudo apt-get install -y zip)

      - name: Package device zip
        run: tools/package.sh build/kobo

      - name: Upload device package artifact
        uses: actions/upload-artifact@v4
        with:
          name: kobo-sudoku-zip
          path: dist/kobo-sudoku.zip
          if-no-files-found: error
